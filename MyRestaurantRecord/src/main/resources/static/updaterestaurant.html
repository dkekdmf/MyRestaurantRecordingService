<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>맛집 기록 수정</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          background: #f9f9f9;
        }

        .container {
          max-width: 500px;
          margin: 80px auto;
          padding: 30px;
          background: white;
          border-radius: 10px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
          text-align: center;
          margin-bottom: 20px;
        }

        label {
          display: block;
          margin-top: 10px;
          font-weight: bold;
        }

        input, textarea {
          width: 100%;
          padding: 12px;
          margin-top: 5px;
          border: 1px solid #ccc;
          border-radius: 6px;
        }

        button {
          width: 100%;
          padding: 12px;
          margin-top: 20px;
          background: #007bff;
          color: white;
          border: none;
          border-radius: 6px;
          cursor: pointer;
        }

        button:hover {
          background: #0056b3;
        }

        .message {
          margin-top: 15px;
          text-align: center;
          font-weight: bold;
          color: green;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>맛집 기록 수정</h1>
    <form id="updateForm">
        <input type="hidden" id="id" name="id">

        <label for="name">맛집 이름</label>
        <input type="text" id="name" required>

        <label for="location">위치</label>
        <input type="text" id="location" required>

        <label for="category">카테고리</label>
        <input type="text" id="category" placeholder="예: 한식, 일식">

        <label for="rating">평점 (0~5)</label>
        <input type="number" id="rating" step="0.1" min="0" max="5">

        <label for="review">리뷰</label>
        <textarea id="review" rows="4"></textarea>

        <label for="visitDate">방문일</label>
        <input type="date" id="visitDate">

        <label for="imgUrl">이미지 URL</label>
        <input type="text" id="imgUrl">

        <button type="submit">수정하기</button>
    </form>
    <div class="message" id="message"></div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const restaurantId = urlParams.get('id');

    document.getElementById("updateForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        location: document.getElementById("location").value,
        category: document.getElementById("category").value,
        rating: parseFloat(document.getElementById("rating").value) || 0,
        review: document.getElementById("review").value,      // 서버 엔티티의 review 필드와 매칭
        visitDate: document.getElementById("visitDate").value,
        imgUrl: document.getElementById("imgUrl").value
      };

      try {
        const response = await fetch(`/restaurant/${restaurantId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          document.getElementById("message").textContent = "수정 완료! 잠시 후 목록으로 이동합니다.";
          document.getElementById("message").style.color = "green";
          setTimeout(() => { window.location.href = "/restaurant.html"; }, 1500);
        } else {
          const errorMsg = await response.text();
          alert("수정 실패: " + errorMsg);
        }
      } catch (error) {
        alert("네트워크 오류가 발생했습니다.");
      }
    });
</script>
</body>
</html>
