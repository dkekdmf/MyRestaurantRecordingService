<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>맛집 기록 수정</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          background: #f9f9f9;
        }

        .container {
          max-width: 500px;
          margin: 80px auto;
          padding: 30px;
          background: white;
          border-radius: 10px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
          text-align: center;
          margin-bottom: 20px;
        }

        label {
          display: block;
          margin-top: 10px;
          font-weight: bold;
        }

        input, textarea {
          width: 100%;
          padding: 12px;
          margin-top: 5px;
          border: 1px solid #ccc;
          border-radius: 6px;
        }

        button {
          width: 100%;
          padding: 12px;
          margin-top: 20px;
          background: #007bff;
          color: white;
          border: none;
          border-radius: 6px;
          cursor: pointer;
        }

        button:hover {
          background: #0056b3;
        }

        .message {
          margin-top: 15px;
          text-align: center;
          font-weight: bold;
          color: green;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>맛집 기록 수정</h1>
    <form id="updateForm">
        <input type="hidden" id="id" name="id">

        <label for="name">맛집 이름</label>
        <input type="text" id="name" required>

        <label for="location">위치</label>
        <input type="text" id="location" required>

        <label for="category">카테고리</label>
        <input type="text" id="category" placeholder="예: 한식, 일식">

        <label for="rating">평점 (0~5)</label>
        <input type="number" id="rating" step="0.1" min="0" max="5">

        <label for="review">리뷰</label>
        <textarea id="review" rows="4"></textarea>

        <label for="visitDate">방문일</label>
        <input type="date" id="visitDate">

        <label for="imgFile">이미지 업로드</label>
        <input type="file" id="imgFile" accept ="image/*">

        <button type="submit">수정하기</button>
    </form>
    <div class="message" id="message"></div>
</div>
<script>
    // 1. URL 파라미터에서 id 추출 (예: ?id=123)
    const urlParams = new URLSearchParams(window.location.search);
    const restaurantId = urlParams.get('id');

    // 페이지 로드 시 기존 데이터 불러오기 (선택 사항이지만 권장)
    async function fetchOriginalData() {
        if (!restaurantId) {
            alert("수정할 대상이 없습니다.");
            return;
        }
        try {
            // 이 경로는 본인의 상세조회 API 주소에 맞춰주세요
            const res = await fetch(`http://localhost:8080/restaurant/${restaurantId}`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById("name").value = data.name;
                document.getElementById("location").value = data.location;
                document.getElementById("category").value = data.category || "";
                document.getElementById("rating").value = data.rating || 0;
                document.getElementById("review").value = data.review || "";
                document.getElementById("visitDate").value = data.visitDate || "";
            }
        } catch (e) {
            console.error("데이터 로드 실패", e);
        }
    }
    fetchOriginalData();

    // 2. 수정 폼 제출 이벤트
    document.getElementById("updateForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        if (!restaurantId) {
            alert("ID가 없습니다. 다시 시도해주세요.");
            return;
        }

        const formData = new FormData();

        // JSON 데이터 생성 (카테고리, 평점 등 누락된 필드 추가)
        const restaurantData = {
            name: document.getElementById("name").value,
            location: document.getElementById("location").value,
            category: document.getElementById("category").value,
            rating: document.getElementById("rating").value,
            review: document.getElementById("review").value,
            visitDate: document.getElementById("visitDate").value
        };

        // Blob으로 감싸서 전송 (Spring의 @RequestPart와 매칭)
        formData.append("restaurant", new Blob([JSON.stringify(restaurantData)], { type: "application/json" }));

        const fileInput = document.getElementById("imgFile");
        if (fileInput.files[0]) {
            formData.append("image", fileInput.files[0]);
        }

        try {
            const response = await fetch(`http://localhost:8080/restaurant/${restaurantId}`, {
                method: "PUT",
                body: formData
            });

            if (response.ok) {
                alert("수정이 완료되었습니다!");
                window.location.href = "restaurant.html"; // 목록 페이지로 이동 (파일명 확인 필요)
            } else {
                const errorText = await response.text();
                alert("수정 실패: " + errorText);
            }
        } catch (error) {
            console.error("통신 에러:", error);
            alert("서버와 통신 중 에러가 발생했습니다.");
        }
    });
</script>
</body>
</html>
