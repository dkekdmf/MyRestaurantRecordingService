<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 맛집 기록</title>
    <style>
        /* 기본 레이아웃 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 30px; background: #f9f9f9; color: #333; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #d35400; padding-bottom: 15px; }

        .user-info h1 { color: #d35400; margin: 0; font-size: 26px; }
       .nickname-text {
            font-size: 20px; /* 기존 14px -> 20px로 확대 */
            color: #e67e22;  /* 맛집 테마색(오렌지) 적용 */
            margin-top: 10px;
            font-weight: 800; /* 아주 굵게 설정 */
            letter-spacing: -0.5px; /* 글자 간격을 좁혀 가독성 향상 */
        }

        .control-panel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }

        /* 카테고리 버튼 */
        .category-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-cat { background: #f1f2f6; border: 1px solid #dfe4ea; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .btn-cat.active { background: #d35400; color: white; border-color: #d35400; font-weight: bold; }

        /* 맛집 카드 그리드 */
        #restaurantList { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* 카드 디자인 및 호버 효과 */
        .restaurant-card {
            background: #fff; border-radius: 12px; padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee;
            display: flex; flex-direction: column; min-height: 440px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .restaurant-card:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); border-color: #d35400; }

        .restaurant-card h3 { margin: 0 0 8px 0; color: #2c3e50; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .cat-tag { font-size: 11px; background: #ffeaa7; color: #d35400; padding: 2px 6px; border-radius: 4px; }

        .card-img, .no-image-box { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin: 12px 0; }
        .no-image-box { background: #f1f2f6; display: flex; align-items: center; justify-content: center; color: #adb5bd; font-size: 13px; border: 1px dashed #dee2e6; }

        .info { font-size: 13px; margin: 3px 0; color: #636e72; }
        .rating { color: #f1c40f; font-weight: bold; }
        .review-text { font-size: 13px; margin-top: 8px; color: #2d3436; flex-grow: 1; line-height: 1.5; }

        /* 버튼 그룹 */
        .btn-group { display: flex; gap: 8px; margin-top: auto; padding-top: 15px; }
        button { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #27ae60; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .btn-edit { background: #3498db; color: white; flex: 1; padding: 8px; font-size: 13px; }
        .btn-del { background: #f1f2f6; color: #e74c3c; border: 1px solid #fab1a0; flex: 1; padding: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="header-container">
    <div class="user-box">
        <h1>🍴 나의 맛집 기록</h1>
        <div id="nicknameArea" class="nickname-text">사용자 정보를 불러오는 중...</div>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <button onclick="handleLogout()" style="background: #95a5a6; color: white; padding: 10px 15px;">로그아웃</button>
        <a href="addRestaurant.html" class="btn-add">새 맛집 등록</a>
    </div>
</div>

<div class="control-panel">
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="가게 이름이나 카테고리를 검색해보세요...">
        <button onclick="handleSearch()" style="background:#d35400; color:white; padding:10px 20px; border-radius:8px;">검색</button>
        <button onclick="resetAll()" style="background:#95a5a6; color:white; padding:10px 15px; border-radius:8px;">초기화</button>
    </div>
    <div class="category-group" id="categoryGroup">
        <span style="font-size:13px; color:#7f8c8d; font-weight:bold;">분류:</span>
        <button class="btn-cat active" onclick="loadAll()">전체보기</button>
    </div>
</div>

<div id="restaurantList"></div>

<script>
    const BASE_URL = "http://localhost:8080";
    let allRestaurants = [];

    // 1. 초기 실행 (인증 확인 + 데이터 로드)
    window.onload = async () => {
        await checkUser(); // 닉네임 먼저 가져오기
        await loadAll();   // 맛집 목록 가져오기
    };

    // 2. 사용자 닉네임 가져오기
   async function checkUser() {
    try {
        const res = await fetch(`${BASE_URL}/api/users/nickname`);
        if (res.ok) {
            const data = await res.json();
            // 텍스트 강조 및 이모지 변경
            document.getElementById("nicknameArea").innerText = `🍲 ${data.nickname}님, 오늘도 맛있는 하루 되세요!`;
        } else {
            // 로그인 안 되어 있으면 쫓아내기
            window.location.href = "login.html";
        }
    } catch (e) {
        console.error("User Check Error:", e);
    }
}

    // 3. 전체 맛집 로드
    async function loadAll() {
        try {
            const res = await fetch(`${BASE_URL}/restaurant/my`);
            if (res.status === 401) return window.location.href = "login.html";

            allRestaurants = await res.json();
            updateCategoryButtons();
            render(allRestaurants);
        } catch (e) {
            document.getElementById("restaurantList").innerHTML = "<p>데이터 로드 실패!</p>";
        }
    }

    // 4. 화면 그리트 (렌더링)
    function render(list, emptyMsg = "등록된 맛집이 없습니다.") {
        const container = document.getElementById("restaurantList");
        container.innerHTML = "";

        if (list.length === 0) {
            container.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding:50px; color:#95a5a6;">${emptyMsg}</p>`;
            return;
        }

        list.forEach(r => {
            const card = document.createElement("div");
            card.className = "restaurant-card";
            const img = r.imgUrl || r.imagePath;

            card.innerHTML = `
                <h3>${r.name || r.restaurantName} <span class="cat-tag">${r.category || '기타'}</span></h3>
                <div class="info">📍 ${r.location || '위치 정보 없음'}</div>
                <div class="info rating">⭐ ${r.rating ? r.rating.toFixed(1) : '0.0'} / 5.0</div>
                <div class="review-text">"${r.review || '리뷰가 없습니다.'}"</div>

                ${img ? `<img src="${BASE_URL}${img}" class="card-img">` : `<div class="no-image-box">📷 이미지 없음</div>`}

                <div class="btn-group">
                    <button class="btn-edit" onclick="location.href='updaterestaurant.html?id=${r.id}'">수정</button>
                    <button class="btn-del" onclick="deleteRes(${r.id})">삭제</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // (나머지 카테고리, 검색, 로그아웃 기능 동일)
    function updateCategoryButtons() {
        const group = document.getElementById("categoryGroup");
        const categories = [...new Set(allRestaurants.map(r => r.category).filter(c => c))];
        group.innerHTML = `<span style="font-size:13px; color:#7f8c8d; font-weight:bold;">분류:</span><button class="btn-cat active" onclick="loadAll()">전체보기</button>`;
        categories.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "btn-cat";
            btn.innerText = cat;
            btn.onclick = (e) => {
                document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                filterByCategory(cat);
            };
            group.appendChild(btn);
        });
    }

    async function filterByCategory(category) {
        const res = await fetch(`${BASE_URL}/restaurant/category/${encodeURIComponent(category)}`);
        const data = await res.json();
        render(data);
    }

    async function handleSearch() {
        const kw = document.getElementById("searchInput").value;
        const res = await fetch(`${BASE_URL}/restaurant/search?keyword=${encodeURIComponent(kw)}`);
        const data = await res.json();
        render(data, "검색 결과가 없습니다.");
    }

    async function deleteRes(id) {
        if (!confirm("정말 삭제할까요?")) return;
        const res = await fetch(`${BASE_URL}/restaurant/${id}`, { method: "DELETE" });
        if (res.ok) loadAll();
    }

    async function handleLogout() {
        if (!confirm("로그아웃 하시겠습니까?")) return;
        const res = await fetch(`${BASE_URL}/api/users/logout`, { method: "POST" });
        if (res.ok) window.location.href = "login.html";
    }

    function resetAll() { document.getElementById("searchInput").value = ""; loadAll(); }
</script>
</body>
</html>
