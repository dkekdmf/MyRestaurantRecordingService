<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 맛집 기록 - 특별한 미식 여정의 시작</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { height: 100vh; display: flex; overflow: hidden; background-color: #f9f9f9; }

        /* [왼쪽] 이미지 세션 */
        .image-section { flex: 1; position: relative; background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1600&auto=format&fit=crop') no-content center/cover; }
        .image-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; justify-content: center; padding: 10%; color: white; }
        .image-overlay h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); animation: fadeInUp 1s ease; }
        .image-overlay p { font-size: 1.2rem; font-weight: 300; opacity: 0.9; line-height: 1.6; animation: fadeInUp 1s ease 0.3s forwards; visibility: hidden; }

        /* [오른쪽] 인증 세션 */
        .auth-section { width: 450px; display: flex; flex-direction: column; justify-content: center; padding: 50px; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        .auth-container { width: 100%; }
        h2 { font-size: 2rem; font-weight: 700; color: #333; margin-bottom: 10px; }
        .subtitle { color: #777; margin-bottom: 40px; font-size: 0.95rem; }

        /* 폼 스타일 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 1px solid #e1e1e1; border-radius: 8px; font-size: 1rem; transition: all 0.3s; }
        input:focus { border-color: #d35400; outline: none; box-shadow: 0 0 0 3px rgba(211, 84, 0, 0.1); }

        /* 버튼 스타일 */
        .btn-primary { width: 100%; padding: 15px; background: #d35400; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: background 0.3s; margin-top: 20px; }
        .btn-primary:hover { background: #ba4a00; }

        /* 전환 링크 */
        .toggle-link { text-align: center; margin-top: 30px; font-size: 0.9rem; color: #666; }
        .toggle-link span { color: #d35400; font-weight: 600; cursor: pointer; margin-left: 5px; text-decoration: underline; }

        /* 애니메이션 및 유틸리티 */
        .hidden { display: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); visibility: visible; } }

        /* 반응형 (화면이 작아지면 한 줄로) */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            .image-section { height: 40vh; }
            .image-overlay h1 { font-size: 2.5rem; }
            .auth-section { width: 100%; padding: 30px; }
        }
    </style>
</head>
<body>

<div class="image-section">
    <div class="image-overlay">
        <h1>당신의 미식 여정을<br>기록하세요.</h1>
        <p>잊지 못할 맛의 기억, 소중한 사람과의 식사.<br>나만의 맛집 지도를 만들어보세요.</p>
        }
    </div>

    <div class="auth-section">

        <div id="loginSection" class="auth-container">
            <h2>다시 오셨군요!</h2>
            <p class="subtitle">오늘도 당신의 새로운 맛집을 기록해 볼까요?</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="loginUsername" placeholder="아이디를 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="비밀번호를 입력해주세요" required>
                </div>
                <button type="submit" class="btn-primary">로그인</button>
            </form>
            <div class="toggle-link">
                처음이신가요? <span onclick="toggleAuth()">회원가입하기</span>
            </div>
        </div>

        <div id="signupSection" class="auth-container hidden">
            <h2>미식가로 환영합니다!</h2>
            <p class="subtitle">계정을 만들고 나만의 맛집 지도를 시작해보세요.</p>
            <form id="signupForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="signupUsername" placeholder="사용하실 아이디" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="signupPassword" placeholder="6자리 이상 비밀번호" required minlength="6">
                </div>
                <div class="form-group">
                    <label>이메일 (선택)</label>
                    <input type="email" id="signupEmail" placeholder="example@email.com">
                </div>
                <button type="submit" class="btn-primary">가입하기</button>
            </form>
            <div class="toggle-link">
                이미 계정이 있나요? <span onclick="toggleAuth()">로그인하기</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080/user"; // 백엔드 API 주소

        // 화면 전환 함수
        function toggleAuth() {
            document.getElementById("loginSection").classList.toggle("hidden");
            document.getElementById("signupSection").classList.toggle("hidden");
        }

        // 회원가입 로직
        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("signupUsername").value;
            const password = document.getElementById("signupPassword").value;
            const email = document.getElementById("signupEmail").value;

            try {
                const res = await fetch(`${API_BASE}/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password, email })
                });

                if (res.ok) {
                    alert("가입을 축하드립니다! 이제 로그인해주세요.");
                    toggleAuth(); // 로그인 화면으로 전환
                } else {
                    const errorMsg = await res.text();
                    alert("가입 실패: " + (errorMsg || "이미 존재하는 아이디일 수 있습니다."));
                }
            } catch (err) { alert("서버 통신 오류가 발생했습니다."); }
        });

        // 로그인 로직
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("loginUsername").value;
            const password = document.getElementById("loginPassword").value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    // 로그인 성공 시 세션이나 토큰 처리가 필요할 수 있습니다.
                    window.location.href = "list.html";
                } else {
                    alert("아이디 또는 비밀번호를 다시 확인해주세요.");
                }
            } catch (err) { alert("서버 통신 오류가 발생했습니다."); }
        });
    </script>
</body>
</html>
