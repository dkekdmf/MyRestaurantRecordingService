<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 맛집 기록 - 회원가입/로그인</title>
</head>
<body>
<h2>회원가입</h2>
<form id="signupForm">
    <input type="text" id="username" placeholder="아이디" required><br>
    <input type="text" id="nickname" placeholder="닉네임" required><br>
    <input type="email" id="email" placeholder="이메일" required><br>
    <input type="password" id="password" placeholder="비밀번호" required><br>
    <button type="submit">회원가입</button>
</form>

<h2>로그인</h2>
<form id="loginForm">
    <input type="text" id="loginUsername" placeholder="아이디" required><br>
    <input type="password" id="loginPassword" placeholder="비밀번호" required><br>
    <button type="submit">로그인</button>
</form>

<script>
    // 회원가입 요청
    document.getElementById("signupForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const user = {
        username: document.getElementById("username").value,
        nickname: document.getElementById("nickname").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      };

      const response = await fetch("/api/users/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(user)
      });

      const data = await response.json();
      alert("회원가입 성공: " + data.nickname + " (" + data.email + ")");
    });

    // 로그인 요청
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const loginData = {
        username: document.getElementById("loginUsername").value,
        password: document.getElementById("loginPassword").value
      };

      const response = await fetch("/api/users/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(loginData)
      });

      const text = await response.text();
      alert(text);
    });
</script>
</body>
</html>
